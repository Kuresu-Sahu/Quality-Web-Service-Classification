<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Service Classification</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<script>

function validate(formObj)
{
    if(formObj.t1.value.length == 0)
    {
        alert("Please Enter Input Values");
        formObj.t1.focus();
        return false;
    }

    return true;
}

</script>

</head>

<body>

<nav class="navbar">

<div class="logo">SSL<span>-WSC</span></div>

<ul class="nav-links">
<li><a href="Predict">Classification</a></li>
<li><a href="index">Logout</a></li>
</ul>

</nav>

<section class="main-container">

<div class="card medium-card">

<div class="title">

<h1>Service Classification</h1>

<p>
Enter the input data for Machine Learning based prediction.
</p>

</div>

<div class="message">
{{ msg | safe }}
</div>

<form name="f1"
method="post"
action="/PredictAction"
onsubmit="return validate(this);">

<div class="form-group">

<label>Input Test Data</label>

<input type="text"
name="t1"
placeholder="Enter Input Data">

</div>

<button type="submit"
class="btn btn-primary"
style="width:100%;">

Submit

</button>

</form>

</div>

</section>

<footer class="footer">
© 2026 SSL-WSC Project
</footer>

</body>
</html>
