<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<script>

function validate(formObj)
{
    if(formObj.t1.value.length == 0)
    {
        alert("Please Enter Username");
        formObj.t1.focus();
        return false;
    }

    if(formObj.t2.value.length == 0)
    {
        alert("Please Enter Password");
        formObj.t2.focus();
        return false;
    }

    return true;
}

</script>

</head>

<body>

<nav class="navbar">

<div class="logo">SSL<span>-WSC</span></div>

<ul class="nav-links">
<li><a href="index">Home</a></li>
<li><a href="AdminLogin">Admin Login</a></li>
</ul>

</nav>

<section class="main-container">

<div class="card small-card">

<div class="title">
<h1>Admin Login</h1>

<p>
Login to access the prediction dashboard.
</p>
</div>

<div class="message">
{{ msg }}
</div>

<form name="f1"
method="post"
action="/AdminLoginAction"
onsubmit="return validate(this);">

<div class="form-group">
<label>Username</label>
<input type="text" name="t1" placeholder="Enter Username">
</div>

<div class="form-group">
<label>Password</label>
<input type="password" name="t2" placeholder="Enter Password">
</div>

<button type="submit" class="btn btn-primary" style="width:100%;">
Login
</button>

</form>

</div>

</section>

<footer class="footer">
© 2026 SSL-WSC Project
</footer>

</body>
</html>
